<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>48 Hour Italian — Italian for Travelers</title>
<meta name="description" content="Learn travel-ready Italian in 48 fifteen-minute blocks. Real vocabulary, pronunciation, and phrases." />
<style>
  /* ============================================================
     48 HOUR ITALIAN — single-file course app
     Standard Italian. Design + quiz engine mirror 48 Hour Portuguese.
     Data shape lives in MAP (curriculum) and LESSONS (content).
     ============================================================ */
  :root{
    --bg:#10140f;            /* deep olive-black */
    --bg2:#161d14;
    --card:#192115;
    --card2:#22301c;
    --ink:#eef3ea;
    --ink-soft:#b6c4ac;
    --line:#2d3a26;
    --green:#1f9d3f;        /* Italian green */
    --green-soft:#3cc463;
    --red:#cf2b2b;          /* Italian red */
    --gold:#e3b13c;
    --good:#39c07a;
    --bad:#e8675e;
    --radius:16px;
    --shadow:0 10px 30px rgba(0,0,0,.35);
    --maxw:680px;
    font-synthesis:none;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:radial-gradient(1200px 600px at 50% -10%, var(--bg2), var(--bg)) fixed;
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .wrap{max-width:var(--maxw);margin:0 auto;padding:18px 18px 60px}
  a{color:var(--green-soft)}
  button{font-family:inherit}

  /* ---------- top bar ---------- */
  .top{display:flex;align-items:center;gap:12px;padding:10px 2px 18px}
  .brand{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
  .flag{width:30px;height:30px;border-radius:7px;flex:0 0 auto;overflow:hidden;
    background:linear-gradient(90deg,var(--green) 0 33.3%, #f3f3ef 33.3% 66.6%, var(--red) 66.6% 100%);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}
  .brand h1{font-size:16px;margin:0;letter-spacing:.2px;font-weight:700}
  .brand small{display:block;font-size:11px;color:var(--ink-soft);font-weight:500;letter-spacing:.3px}
  .top .spacer{flex:1}
  .pill{font-size:12px;color:var(--ink-soft);background:var(--card);border:1px solid var(--line);
    padding:6px 10px;border-radius:999px;white-space:nowrap}

  /* ---------- hero ---------- */
  .hero{background:linear-gradient(160deg,var(--card2),var(--card));border:1px solid var(--line);
    border-radius:var(--radius);padding:22px;margin-bottom:20px;box-shadow:var(--shadow)}
  .hero h2{margin:0 0 6px;font-size:22px;line-height:1.25}
  .hero p{margin:0;color:var(--ink-soft);font-size:14px}
  .progressbar{height:9px;background:#0d120b;border-radius:999px;margin-top:16px;overflow:hidden;border:1px solid var(--line)}
  .progressbar > i{display:block;height:100%;background:linear-gradient(90deg,var(--green),var(--green-soft));width:0;transition:width .4s ease}
  .progress-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-soft);margin-top:8px}

  /* ---------- week / lesson list ---------- */
  .week{margin:22px 0 8px;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);font-weight:700}
  .lesson{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;transition:transform .08s ease,border-color .15s}
  .lesson:hover{border-color:var(--green);transform:translateY(-1px)}
  .lesson .num{width:38px;height:38px;border-radius:10px;flex:0 0 auto;display:grid;place-items:center;
    font-weight:700;background:#0d120b;border:1px solid var(--line);color:var(--ink-soft)}
  .lesson.done .num{background:var(--green);color:#04130a;border-color:var(--green-soft)}
  .lesson .body{flex:1;min-width:0}
  .lesson .body b{display:block;font-size:15px}
  .lesson .body span{display:block;font-size:12.5px;color:var(--ink-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lesson .tick{font-size:12px;color:var(--ink-soft);white-space:nowrap}
  .lesson.locked{opacity:.55}

  /* ---------- lesson detail (module list) ---------- */
  .back{background:none;border:none;color:var(--green-soft);font-size:14px;cursor:pointer;padding:8px 0;margin-bottom:6px;display:inline-flex;gap:6px;align-items:center}
  .mod{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);
    border-radius:13px;padding:13px;margin-bottom:9px;cursor:pointer;transition:border-color .15s}
  .mod:hover{border-color:var(--green)}
  .mod .ico{width:34px;height:34px;border-radius:9px;flex:0 0 auto;display:grid;place-items:center;background:#0d120b;border:1px solid var(--line);font-size:15px}
  .mod.done .ico{background:var(--green);border-color:var(--green-soft)}
  .mod .body{flex:1;min-width:0}
  .mod .body b{font-size:14.5px;display:block}
  .mod .body span{font-size:12px;color:var(--ink-soft)}
  .mod.exam{border-color:var(--gold)}
  .mod.exam .ico{border-color:var(--gold);color:var(--gold)}

  /* ---------- teach cards ---------- */
  .stage{min-height:60vh}
  .crumb{font-size:12px;color:var(--ink-soft);margin-bottom:4px}
  .stage h3{margin:2px 0 14px;font-size:20px}
  .lead{background:linear-gradient(160deg,var(--card2),var(--card));border:1px solid var(--line);
    border-radius:14px;padding:16px 18px;margin-bottom:14px;font-size:15px;color:var(--ink-soft)}
  .phrase{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 16px;margin-bottom:11px}
  .phrase .it{font-size:19px;font-weight:700;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .phrase .say{font-size:13.5px;color:var(--gold);margin-top:3px;font-style:italic;letter-spacing:.2px}
  .phrase .en{font-size:14px;color:var(--ink-soft);margin-top:5px}
  .speaker{border:1px solid var(--line);background:#0d120b;color:var(--ink-soft);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:14px;flex:0 0 auto}
  .speaker:hover{border-color:var(--green)}
  .tip{border-left:3px solid var(--gold);background:rgba(227,177,60,.06);padding:11px 14px;border-radius:0 12px 12px 0;margin-bottom:11px;font-size:13.5px;color:var(--ink)}
  .tip b{color:var(--gold)}
  .audio-note{display:flex;gap:10px;align-items:flex-start;background:rgba(60,196,99,.08);border:1px solid var(--line);border-left:3px solid var(--green-soft);border-radius:0 12px 12px 0;padding:10px 13px;margin-bottom:14px;font-size:12.5px;color:var(--ink-soft);line-height:1.45}
  .audio-note b{color:var(--green-soft)}
  .audio-note .x{margin-left:auto;background:none;border:none;color:var(--ink-soft);cursor:pointer;font-size:17px;line-height:1;flex:0 0 auto;padding:0 2px}
  .audio-note .x:hover{color:var(--ink)}

  /* ---------- test ---------- */
  .q{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
  .q .qtext{font-size:16px;font-weight:600;margin-bottom:12px}
  .opt{display:block;width:100%;text-align:left;background:#0d120b;border:1px solid var(--line);color:var(--ink);
    padding:12px 14px;border-radius:11px;margin-bottom:9px;cursor:pointer;font-size:15px;transition:border-color .12s,background .12s}
  .opt:hover{border-color:var(--green)}
  .opt.correct{border-color:var(--good);background:rgba(57,192,122,.14)}
  .opt.wrong{border-color:var(--bad);background:rgba(232,103,94,.14)}
  .opt:disabled{cursor:default}
  .answerbox{display:flex;gap:8px}
  .answerbox input{flex:1;background:#0d120b;border:1px solid var(--line);color:var(--ink);font-size:16px;
    padding:12px 14px;border-radius:11px;outline:none}
  .answerbox input:focus{border-color:var(--green)}
  .answerbox button{background:var(--green);border:none;color:#04130a;font-weight:700;padding:0 18px;border-radius:11px;cursor:pointer}
  .explain{font-size:13px;margin-top:10px;padding:10px 12px;border-radius:10px;background:#0d120b;border:1px solid var(--line);color:var(--ink-soft)}
  .explain.ok{border-color:var(--good)}
  .explain.no{border-color:var(--bad)}

  /* ---------- buttons / footer ---------- */
  .btn{display:block;width:100%;background:var(--green);color:#04130a;font-weight:700;font-size:16px;border:none;
    padding:15px;border-radius:13px;cursor:pointer;margin-top:8px;transition:filter .12s}
  .btn:hover{filter:brightness(1.07)}
  .btn.ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--line)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .result{text-align:center;padding:30px 10px}
  .result .big{font-size:46px;font-weight:800;margin:6px 0}
  .result .big.pass{color:var(--good)}
  .result .big.fail{color:var(--bad)}
  footer{margin-top:40px;padding-top:20px;border-top:1px solid var(--line);text-align:center;font-size:12px;color:var(--ink-soft)}
  footer a{cursor:pointer}
  .hidden{display:none !important}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand" onclick="go('home')">
      <div class="flag"></div>
      <div><h1>48 Hour Italian</h1><small>ITALIAN FOR TRAVELERS · ITALIA</small></div>
    </div>
    <div class="spacer"></div>
    <div class="pill" id="streakPill">0 / 24 lessons</div>
  </div>
  <div id="app"></div>
  <footer>
    <p>48 Hour Italian · Italian for travelers</p>
    <p><a onclick="resetProgress()">Reset progress</a></p>
  </footer>
</div>

<script>
/* ================================================================
   CURRICULUM MAP — 24 lessons across 8 weeks (3 lessons / week).
   24 lessons × 8 modules × 15 min = 48 hours of study.
   ================================================================ */
const MAP = [
  // ---- Week 1 · Foundations ----
  {id:1,  week:1, title:"First Words & Sounds",        blurb:"Greetings, please & thanks, yes/no, and the sounds that make Italian sing."},
  {id:2,  week:1, title:"Meeting People",              blurb:"Names, where you're from, and easy courtesy that wins smiles."},
  {id:3,  week:1, title:"Numbers & Survival",          blurb:"Numbers 0–100, 'how much?', and the phrases that get you unstuck."},
  // ---- Week 2 · Getting Around ----
  {id:4,  week:2, title:"Directions",                  blurb:"'Dov'è…?', left/right, near/far, and reading the street."},
  {id:5,  week:2, title:"Trains, Buses & Trams",       blurb:"Treno, autobus, tram — tickets, platforms, stops."},
  {id:6,  week:2, title:"Taxis & Driving",             blurb:"Taxis, ride apps, fuel, parking, and 'mi porti a…'."},
  // ---- Week 3 · Food & Drink ----
  {id:7,  week:3, title:"Caffè & Pasticceria",         blurb:"Ordering coffee the Italian way, pastries, and colazione."},
  {id:8,  week:3, title:"At the Restaurant",           blurb:"'Vorrei…', the menu, allergies, and asking for the bill."},
  {id:9,  week:3, title:"Markets & Buying Food",       blurb:"Quantities, weights, prices, and fresh-market small talk."},
  // ---- Week 4 · Daily Life ----
  {id:10, week:4, title:"Shopping",                    blurb:"Sizes, colours, trying things on, and 'sto solo guardando'."},
  {id:11, week:4, title:"Money & ATMs",                blurb:"Paying, cards, the bancomat, and splitting the bill."},
  {id:12, week:4, title:"Time, Days & Hours",          blurb:"Telling time, days of the week, and opening hours."},
  // ---- Week 5 · Staying Somewhere ----
  {id:13, week:5, title:"Hotels & Lodging",            blurb:"Checking in, your room, the bagno, check-out."},
  {id:14, week:5, title:"Problems & Asking for Help",  blurb:"'Non capisco', 'può ripetere?', and getting help fast."},
  {id:15, week:5, title:"Health & Pharmacy",           blurb:"The farmacia, feeling unwell, and simple medical needs."},
  // ---- Week 6 · Connecting ----
  {id:16, week:6, title:"Small Talk",                  blurb:"Weather, 'che bello!', opinions, and keeping a chat going."},
  {id:17, week:6, title:"Phone & Internet",            blurb:"Cellulare, wifi, SIM cards, and staying online."},
  {id:18, week:6, title:"Making Plans",                blurb:"Meeting up, invitations, times and places to agree on."},
  // ---- Week 7 · Exploring ----
  {id:19, week:7, title:"Sightseeing",                 blurb:"Tickets, tours, museums, and 'a che ora apre?'."},
  {id:20, week:7, title:"A Night Out",                 blurb:"Bars, aperitivo, ordering rounds, and going out in Italy."},
  {id:21, week:7, title:"Beach & Outdoors",            blurb:"Spiaggia, weather, nature, and easy outdoor talk."},
  // ---- Week 8 · Polishing ----
  {id:22, week:8, title:"Polite & Formal Italian",     blurb:"'Lei', formal requests, and sounding gracious."},
  {id:23, week:8, title:"When Things Go Wrong",        blurb:"Lost items, complaints, mishaps, and staying calm."},
  {id:24, week:8, title:"Putting It Together",         blurb:"Real conversations end-to-end — your final review."},
];
const WEEK_TITLES = {1:"Week 1 · Foundations",2:"Week 2 · Getting Around",3:"Week 3 · Food & Drink",4:"Week 4 · Daily Life",5:"Week 5 · Staying Somewhere",6:"Week 6 · Connecting",7:"Week 7 · Exploring",8:"Week 8 · Polishing"};

/* helper builders */
const lead   = (t)=>({type:'lead', t});
const phrase = (it,say,en)=>({type:'phrase', it, say, en});
const tip    = (t)=>({type:'tip', t});
const mc     = (q,options,answer,explain)=>({type:'mc', q, options, answer, explain});
const text   = (q,accept,explain)=>({type:'text', q, accept, explain});

/* ================================================================
   LESSONS — authored content. Lesson 1 fully authored as the
   template. Lessons 2–24 added in continuous authoring.
   ================================================================ */
const LESSONS = [
{
  id:1, week:1,
  title:"First Words & Sounds",
  blurb:"Greetings, please & thanks, yes/no, and the sounds that make Italian sing.",
  modules:[
    /* ---- Module 1 ---- */
    {
      title:"Greetings",
      minutes:15,
      teach:[
        lead("Start here. These greetings open almost any door in Italy. Say them with warmth — Italians appreciate the effort enormously."),
        phrase("Ciao","chow","Hi / bye (informal)"),
        phrase("Salve","SAHL-veh","Hello (neutral, polite)"),
        phrase("Buongiorno","bwon-JOR-noh","Good morning / good day"),
        phrase("Buonasera","bwoh-nah-SEH-rah","Good evening"),
        phrase("Come va?","KOH-meh vah","How's it going?"),
        tip("<b>Ciao</b> is informal — perfect with friends, but use <b>buongiorno</b> or <b>salve</b> with shopkeepers and strangers. <b>Ciao</b> means both 'hi' and 'bye'."),
        tip("'ci' sounds like 'ch' in English — so <b>ciao</b> is 'chow', not 'see-ow'."),
      ],
      test:[
        mc("Which greeting is best with a shopkeeper you don't know?",["Ciao","Buongiorno","Come va?"],1,"Buongiorno is polite for strangers; ciao is informal."),
        text("Write the all-purpose informal hello/bye.",["ciao"],"Ciao — works for both hi and bye, among friends."),
        mc("'Buonasera' is used…",["in the morning","in the evening","only at night"],1,"Buonasera = good evening."),
      ],
    },
    /* ---- Module 2 ---- */
    {
      title:"Please & Thank You",
      minutes:15,
      teach:[
        lead("Courtesy is everything. And meet 'prego' — a magic word that means 'you're welcome', 'go ahead', 'after you', and more."),
        phrase("Per favore","pehr fah-VOH-reh","Please"),
        phrase("Grazie","GRAH-tsyeh","Thank you"),
        phrase("Grazie mille","GRAH-tsyeh MEEL-leh","Thanks a lot"),
        phrase("Prego","PREH-goh","You're welcome / go ahead"),
        phrase("Di niente","dee NYEN-teh","Don't mention it"),
        tip("<b>Prego</b> is a Swiss-army word: 'you're welcome', 'after you', 'go ahead', 'please do'. You'll hear it constantly."),
        tip("<b>Grazie</b> ends in 'zie' = 'tsyeh' — the 'z' is a crisp 'ts' sound, not a buzzing 'z'."),
      ],
      test:[
        mc("Someone thanks you. The classic reply is…",["Per favore","Prego","Scusi"],1,"Prego = you're welcome (among its many uses)."),
        text("Write 'please' (two words).",["per favore"],"Per favore = please."),
        mc("'Grazie mille' means…",["no thanks","thanks a lot","you're welcome"],1,"Grazie mille = a thousand thanks."),
      ],
    },
    /* ---- Module 3 ---- */
    {
      title:"Yes, No & the Basics",
      minutes:15,
      teach:[
        lead("Tiny words, huge reach. These let you answer almost anything and stay polite doing it."),
        phrase("Sì","see","Yes"),
        phrase("No","noh","No"),
        phrase("Forse","FOR-seh","Maybe"),
        phrase("Scusi","SKOO-zee","Excuse me / sorry (polite)"),
        phrase("Permesso","pehr-MES-soh","Excuse me (to pass / come through)"),
        tip("<b>Scusi</b> is the polite form (to strangers); <b>scusa</b> is informal (to friends). Use it to apologise or get attention."),
        tip("Say <b>permesso</b> when squeezing past someone or stepping into their space — it's expected and polite."),
      ],
      test:[
        text("Write 'yes' in Italian (accent optional).",["sì","si"],"Sì — note the accent marks the stress."),
        mc("You need to squeeze past someone on a crowded bus. You say…",["Scusi","Permesso","Forse"],1,"Permesso = excuse me, to pass through."),
        mc("Which means 'maybe'?",["Sì","Forse","No"],1,"Forse = maybe."),
      ],
    },
    /* ---- Module 4 ---- */
    {
      title:"Goodbyes",
      minutes:15,
      teach:[
        lead("Leave well and you'll be remembered well. A few ways to say goodbye, from formal to friendly."),
        phrase("Arrivederci","ah-ree-veh-DEHR-chee","Goodbye (polite)"),
        phrase("A presto","ah PRES-toh","See you soon"),
        phrase("A dopo","ah DOH-poh","See you later"),
        phrase("A domani","ah doh-MAH-nee","See you tomorrow"),
        phrase("Ciao ciao","chow chow","Bye-bye (casual)"),
        tip("<b>Arrivederci</b> is the standard polite goodbye. The '-ci' ending = 'chee' (soft c before i)."),
      ],
      test:[
        mc("The standard polite 'goodbye' is…",["Ciao","Arrivederci","Salve"],1,"Arrivederci = goodbye (polite)."),
        text("Write 'see you tomorrow' (two words).",["a domani"],"A domani — domani = tomorrow."),
        mc("'A presto' means…",["see you soon","goodbye forever","good evening"],0,"A presto = see you soon."),
      ],
    },
    /* ---- Module 5 ---- */
    {
      title:"The C & G Sounds",
      minutes:15,
      teach:[
        lead("Here's the rule that unlocks Italian pronunciation: c and g are SOFT before e/i, and HARD before a/o/u or an h."),
        phrase("Ciao","chow","Hi/bye (c+i = 'ch')"),
        phrase("Cena","CHEH-nah","Dinner (c+e = 'ch')"),
        phrase("Gelato","jeh-LAH-toh","Ice cream (g+e = 'j')"),
        phrase("Chianti","KYAN-tee","Chianti wine (ch = 'k')"),
        phrase("Spaghetti","spah-GET-tee","Spaghetti (gh = hard 'g')"),
        tip("Soft before e/i: <b>c → 'ch'</b> (ciao, cena), <b>g → 'j'</b> (gelato, giro). Hard before a/o/u or h: <b>ch → 'k'</b> (Chianti), <b>gh → hard g</b> (spaghetti)."),
        tip("That's why <b>chi</b> = 'kee' and <b>che</b> = 'keh' — the 'h' hardens the c."),
      ],
      test:[
        mc("In Italian, 'c' before 'e' or 'i' sounds like…",["k","ch","s"],1,"Soft c before e/i = 'ch' (ciao, cena)."),
        text("How do you say the word for 'ice cream'? (Italian spelling)",["gelato"],"Gelato — g before e is soft, 'jeh-LAH-toh'."),
        mc("'Chianti' begins with a…",["'ch' as in chair","'k' sound","'sh' sound"],1,"'ch' before a vowel = hard 'k': 'KYAN-tee'."),
      ],
    },
    /* ---- Module 6 ---- */
    {
      title:"Double Letters, GN & GLI",
      minutes:15,
      teach:[
        lead("Two more signature sounds — and why Italians really hold those double consonants."),
        phrase("Pizza","PEET-tsah","Pizza (double z = 'ts', held)"),
        phrase("Espresso","es-PRES-soh","Espresso (double s, held)"),
        phrase("Gnocchi","NYOK-kee","Gnocchi (gn = 'ny')"),
        phrase("Signore","see-NYOH-reh","Sir / Mr (gn = 'ny')"),
        phrase("Famiglia","fah-MEE-lyah","Family (gli = 'ly')"),
        tip("<b>gn</b> = 'ny' (like canyon): gnocchi, signore, bagno. <b>gli</b> = 'ly' (like million): famiglia, biglietto."),
        tip("Double consonants are <b>held longer</b> — 'pizza' is 'peet-tsa', not 'pitsa'. The length can even change a word's meaning."),
      ],
      test:[
        mc("'gn' in Italian sounds like…",["the 'gn' in sign","'ny' as in canyon","a hard g + n"],1,"gn = 'ny' (gnocchi, signore)."),
        text("Write the Italian word for 'family' (gli = 'ly').",["famiglia"],"Famiglia — 'fah-MEE-lyah'."),
        mc("Double consonants in Italian are…",["silent","held longer","skipped"],1,"They're held longer — it matters!"),
      ],
    },
    /* ---- Module 7 ---- */
    {
      title:"Your First Real Phrases",
      minutes:15,
      teach:[
        lead("Now string it together. These handle a surprising amount of real life — especially admitting you didn't catch something."),
        phrase("Non capisco","non kah-PEES-koh","I don't understand"),
        phrase("Parla inglese?","PAR-lah een-GLEH-zeh","Do you speak English?"),
        phrase("Può ripetere?","pwoh ree-PEH-teh-reh","Can you repeat that?"),
        phrase("Come sta?","KOH-meh stah","How are you? (polite)"),
        phrase("Più lentamente, per favore","pyoo len-tah-MEN-teh, pehr fah-VOH-reh","Slower, please"),
        tip("<b>Non capisco</b> ('I don't understand') is your single most useful sentence. Pair it with <b>più lentamente</b> (more slowly) and you'll always get a kinder, slower reply."),
      ],
      test:[
        text("Write 'I don't understand' (two words).",["non capisco"],"Non capisco — your most useful phrase."),
        mc("You want someone to slow down. You say…",["Può ripetere?","Più lentamente","Parla inglese?"],1,"Più lentamente = more slowly."),
        mc("'Parla inglese?' asks…",["Are you English?","Do you speak English?","Where is England?"],1,"Parla inglese? = Do you speak English?"),
      ],
    },
    /* ---- Module 8 · EXAM ---- */
    {
      title:"Lesson 1 Exam",
      minutes:15,
      teach:[
        lead("No new words — this is your Lesson 1 review. Pass at 70% and Lesson 2 unlocks. Trust your ear."),
        tip("Remember the sound rules: <b>c/g soft before e/i</b> (ciao, gelato), <b>gn = 'ny'</b>, <b>gli = 'ly'</b>, and <b>double consonants held longer</b>."),

/* ================================================================
   STATE + PERSISTENCE
   localStorage key: i48_progress. We persist state.done only.
   ================================================================ */
const STORE_KEY = "i48_progress";
const PASS = 0.7;

let state = { view:"home", lesson:null, module:null, done:{} };

function saveProgress(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(state.done)); }
  catch(e){ /* fail safe — private mode / quota */ }
}
function loadProgress(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw){ const d = JSON.parse(raw); if(d && typeof d==="object") state.done = d; }
  }catch(e){ state.done = {}; }
}
function resetProgress(){
  if(confirm("Reset all progress? This clears every completed lesson and cannot be undone.")){
    state.done = {};
    try{ localStorage.removeItem(STORE_KEY); }catch(e){}
    go("home");
  }
}
function markDone(lessonId, modIdx, score, total){
  const pct = total ? score/total : 1;
  state.done[lessonId+"-"+modIdx] = {score, total, pct:Math.round(pct*100), passed:pct>=PASS};
  saveProgress();
}
const modKey = (l,m)=>l+"-"+m;
function isModuleDone(l,m){ const r=state.done[modKey(l,m)]; return !!(r && r.passed); }
function lessonObj(id){ return LESSONS.find(L=>L.id===id) || null; }
function lessonComplete(id){
  const L = lessonObj(id); if(!L) return false;
  return L.modules.every((_,i)=>isModuleDone(id,i));
}
function lessonAuthored(id){ return !!lessonObj(id); }
function lessonUnlocked(id){
  // No prerequisites — any authored lesson is open. (Locking removed by request.)
  return lessonAuthored(id);
}
function countDoneLessons(){ return MAP.filter(m=>lessonComplete(m.id)).length; }

/* ================================================================
   AUDIO — browser speech synthesis (Web Speech API), Italian.
   Free, on-device, no recordings. Quality depends on the it-IT
   voices installed on the user's device.
   ================================================================ */
let _itVoice = null;
function pickItVoice(){
  if(!('speechSynthesis' in window)) return null;
  const voices = speechSynthesis.getVoices() || [];
  if(!voices.length) return null;
  return voices.find(v => /it[-_]IT/i.test(v.lang))      // explicit Italian (Italy)
      || voices.find(v => /^it/i.test(v.lang))           // any Italian
      || null;
}
if('speechSynthesis' in window){
  _itVoice = pickItVoice();
  speechSynthesis.onvoiceschanged = () => { _itVoice = pickItVoice(); };
}

/* One-time, dismissible note explaining how the browser audio works. */
const AUDIO_NOTE_KEY = "i48_audio_note";
function audioNoteDismissed(){ try{ return localStorage.getItem(AUDIO_NOTE_KEY)==="1"; }catch(e){ return false; } }
function dismissAudioNote(){ try{ localStorage.setItem(AUDIO_NOTE_KEY,"1"); }catch(e){} drawTeach(); }
function audioNoteHTML(mod){
  if(!('speechSynthesis' in window)) return "";
  if(audioNoteDismissed()) return "";
  if(!mod.teach.some(t=>t.type==="phrase")) return "";
  return `<div class="audio-note">
    <span>🔊 <b>Tap a speaker to hear a phrase.</b> Audio uses your device's Italian voice — for the best accent, add an <b>Italian (Italy)</b> voice in your system settings. (The first tap can be silent — just tap again.)</span>
    <button class="x" title="Got it" aria-label="Dismiss note" onclick="dismissAudioNote()">×</button>
  </div>`;
}
function speak(it){
  if(!it || !('speechSynthesis' in window)) return;
  try{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(it);
    u.lang = 'it-IT';
    if(!_itVoice) _itVoice = pickItVoice();
    if(_itVoice) u.voice = _itVoice;
    u.rate = 0.9;
    speechSynthesis.speak(u);
  }catch(e){ /* fail safe */ }
}

/* ================================================================
   ROUTER + RENDER
   ================================================================ */
const app = ()=>document.getElementById("app");
function go(view, lesson=null, module=null){
  state.view=view; state.lesson=lesson; state.module=module;
  window.scrollTo(0,0);
  render();
}
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function render(){
  document.getElementById("streakPill").textContent = countDoneLessons()+" / 24 lessons";
  if(state.view==="home")   return renderHome();
  if(state.view==="lesson") return renderLesson();
  if(state.view==="module") return renderModule();
}

/* ---------- HOME ---------- */
function renderHome(){
  const doneCount = countDoneLessons();
  const pct = Math.round(doneCount/24*100);
  let html = `
   <div class="hero">
     <h2>Benvenuto. Welcome to Italian.</h2>
     <p>Forty-eight fifteen-minute blocks. Real, travel-ready Italian — the words and sounds you'll actually use from Rome to the Amalfi Coast.</p>
     <div class="progressbar"><i style="width:${pct}%"></i></div>
     <div class="progress-meta"><span>${doneCount} of 24 lessons complete</span><span>${pct}%</span></div>
   </div>`;

  let currentWeek = 0;
  MAP.forEach(m=>{
    if(m.week!==currentWeek){ currentWeek=m.week; html+=`<div class="week">${WEEK_TITLES[m.week]}</div>`; }
    const authored = lessonAuthored(m.id);
    const unlocked = authored && lessonUnlocked(m.id);
    const complete = lessonComplete(m.id);
    const cls = "lesson"+(complete?" done":"")+((!unlocked)?" locked":"");
    const click = unlocked ? `onclick="go('lesson',${m.id})"` : "";
    let right = "";
    if(!authored)      right = `<span class="tick">soon</span>`;
    else if(!unlocked) right = `<span class="tick">🔒 finish L${m.id-1}</span>`;
    else if(complete)  right = `<span class="tick">✓ done</span>`;
    else {
      const L=lessonObj(m.id); const d=L.modules.filter((_,i)=>isModuleDone(m.id,i)).length;
      right = `<span class="tick">${d}/${L.modules.length}</span>`;
    }
    html += `
     <div class="${cls}" ${click}>
       <div class="num">${m.id}</div>
       <div class="body"><b>${esc(m.title)}</b><span>${esc(m.blurb)}</span></div>
       ${right}
     </div>`;
  });
  app().innerHTML = html;
}

/* ---------- LESSON DETAIL ---------- */
function renderLesson(){
  const L = lessonObj(state.lesson);
  if(!L){ go("home"); return; }
  let html = `<button class="back" onclick="go('home')">← All lessons</button>
    <div class="crumb">${WEEK_TITLES[L.week]}</div>
    <h3 style="margin-top:2px">Lesson ${L.id} · ${esc(L.title)}</h3>
    <p style="color:var(--ink-soft);font-size:14px;margin-top:-6px">${esc(L.blurb)}</p>`;
  L.modules.forEach((mod,i)=>{
    const done = isModuleDone(L.id,i);
    const exam = i===L.modules.length-1;
    const cls = "mod"+(done?" done":"")+(exam?" exam":"");
    const r = state.done[modKey(L.id,i)];
    const sub = done ? `Passed · ${r.pct}%` : (exam?"Lesson exam · pass 70%":"15 min · short test");
    html += `
     <div class="${cls}" onclick="go('module',${L.id},${i})">
       <div class="ico">${done?"✓":(exam?"★":(i+1))}</div>
       <div class="body"><b>${esc(mod.title)}</b><span>${sub}</span></div>
     </div>`;
  });
  app().innerHTML = html;
}

/* ---------- MODULE (teach → test → result) ---------- */
let session = null;

function renderModule(){
  const L = lessonObj(state.lesson);
  const mod = L.modules[state.module];
  session = {phase:"teach", answers:Array(mod.test.length).fill(null), checked:Array(mod.test.length).fill(false)};
  drawTeach();
}

function drawTeach(){
  const L = lessonObj(state.lesson);
  const mod = L.modules[state.module];
  let html = `<button class="back" onclick="go('lesson',${L.id})">← Lesson ${L.id}</button>
    <div class="stage">
      <div class="crumb">Lesson ${L.id} · Block ${state.module+1} of ${L.modules.length}</div>
      <h3>${esc(mod.title)}</h3>
      ${audioNoteHTML(mod)}`;
  mod.teach.forEach(item=>{
    if(item.type==="lead") html += `<div class="lead">${item.t}</div>`;
    else if(item.type==="tip") html += `<div class="tip">💡 ${item.t}</div>`;
    else if(item.type==="phrase") html += `
      <div class="phrase">
        <div class="it">${esc(item.it)} <button class="speaker" title="Hear it (Italian)" aria-label="Play pronunciation" data-it="${esc(item.it)}" onclick="speak(this.dataset.it)">🔊</button></div>
        <div class="say">${esc(item.say)}</div>
        <div class="en">${esc(item.en)}</div>
      </div>`;
  });
  const label = mod.test.length ? "Start the test →" : "Mark complete →";
  html += `<button class="btn" onclick="${mod.test.length?'startTest()':'finishModule()'}">${label}</button></div>`;
  app().innerHTML = html;
}

function startTest(){ session.phase="test"; session.idx=0; drawTest(); }

function drawTest(){
  const L = lessonObj(state.lesson);
  const mod = L.modules[state.module];
  let html = `<button class="back" onclick="go('lesson',${L.id})">← Lesson ${L.id}</button>
    <div class="stage">
      <div class="crumb">${esc(mod.title)} · Test</div>
      <h3>Quick check</h3>`;
  mod.test.forEach((q,qi)=>{
    html += `<div class="q"><div class="qtext">${qi+1}. ${esc(q.q)}</div>`;
    const checked = session.checked[qi];
    const given = session.answers[qi];
    if(q.type==="mc"){
      q.options.forEach((opt,oi)=>{
        let cls="opt";
        if(checked){
          if(oi===q.answer) cls+=" correct";
          else if(oi===given) cls+=" wrong";
        }
        html += `<button class="${cls}" ${checked?"disabled":""} onclick="answerMC(${qi},${oi})">${esc(opt)}</button>`;
      });
    } else {
      const val = given!==null?esc(given):"";
      html += `<div class="answerbox">
        <input id="ti-${qi}" value="${val}" ${checked?"disabled":""} placeholder="type your answer…"
          onkeydown="if(event.key==='Enter')answerText(${qi})" autocomplete="off" autocapitalize="off" />
        ${checked?"":`<button onclick="answerText(${qi})">Check</button>`}
      </div>`;
    }
    if(checked){
      const ok = isCorrect(q,given);
      html += `<div class="explain ${ok?'ok':'no'}">${ok?"✓ ":"✗ "}${esc(q.explain)}</div>`;
    }
    html += `</div>`;
  });
  const allChecked = session.checked.every(Boolean);
  html += `<button class="btn" ${allChecked?"":"disabled"} onclick="finishTest()">See results →</button></div>`;
  app().innerHTML = html;
}

function isCorrect(q,given){
  if(given===null) return false;
  if(q.type==="mc") return given===q.answer;
  const norm = String(given).trim().toLowerCase();
  return q.accept.map(a=>a.toLowerCase()).includes(norm);
}
function answerMC(qi,oi){ if(session.checked[qi])return; session.answers[qi]=oi; session.checked[qi]=true; drawTest(); }
function answerText(qi){
  if(session.checked[qi])return;
  const el=document.getElementById("ti-"+qi);
  session.answers[qi]=el?el.value:""; session.checked[qi]=true; drawTest();
}

function finishTest(){
  const L = lessonObj(state.lesson);
  const mod = L.modules[state.module];
  let score=0;
  mod.test.forEach((q,qi)=>{ if(isCorrect(q,session.answers[qi])) score++; });
  markDone(L.id, state.module, score, mod.test.length);
  const pct=Math.round(score/mod.test.length*100);
  const passed=pct>=PASS*100;
  const last = state.module===L.modules.length-1;
  const nextLesson = MAP.find(m=>m.id===L.id+1);
  let html = `<div class="result">
      <div class="crumb">${esc(mod.title)}</div>
      <div class="big ${passed?'pass':'fail'}">${pct}%</div>
      <p>${score} / ${mod.test.length} correct — ${passed?"passed!":"keep going, you need 70%."}</p>`;
  if(passed && last && nextLesson && lessonAuthored(nextLesson.id)){
    html += `<button class="btn" onclick="go('lesson',${nextLesson.id})">Start Lesson ${nextLesson.id} →</button>`;
  } else if(passed && last && nextLesson){
    html += `<p style="color:var(--ink-soft)">Lesson ${L.id} complete. Lesson ${nextLesson.id} is coming soon.</p>`;
  } else if(passed){
    html += `<button class="btn" onclick="go('lesson',${L.id})">Back to Lesson ${L.id} →</button>`;
  }
  if(!passed){
    html += `<button class="btn" onclick="go('module',${L.id},${state.module})">Try again</button>`;
  }
  html += `<button class="btn ghost" onclick="go('lesson',${L.id})">Lesson overview</button></div>`;
  app().innerHTML = html;
}

function finishModule(){
  const L = lessonObj(state.lesson);
  markDone(L.id, state.module, 1, 1);
  go("lesson", L.id);
}

/* ---------- boot ---------- */
loadProgress();
go("home");
</script>
